name: Post size report comment

# Runs from the default branch with a write token, so size reports generated by
# pull requests from forks can still be posted. This workflow must never check
# out or execute the pull request's code.
on:
  workflow_run:
    workflows: ["Build BlueSCSI firmware"]
    types: [completed]

permissions:
  actions: read
  pull-requests: write

jobs:
  size_comment:
    name: Post size comment on PR
    runs-on: ubuntu-latest
    if: github.event.workflow_run.event == 'pull_request'

    steps:
      - name: Download size report
        id: download
        uses: actions/download-artifact@v8
        continue-on-error: true
        with:
          name: size-report
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      # workflow_run.pull_requests is empty for forks, so resolve the number
      # from the head SHA rather than trusting anything in the artifact.
      - name: Resolve PR number
        id: pr
        if: steps.download.outcome == 'success'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
        run: |
          number=$(gh api "repos/${GITHUB_REPOSITORY}/commits/${HEAD_SHA}/pulls" --jq '.[0].number // empty')
          echo "number=${number}" >> "$GITHUB_OUTPUT"

      - name: Post size comment on PR
        if: steps.pr.outputs.number != ''
        uses: marocchino/sticky-pull-request-comment@v3
        with:
          header: bluescsi-size-report
          number: ${{ steps.pr.outputs.number }}
          path: size-report.md
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
